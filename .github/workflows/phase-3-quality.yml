name: Phase 3 quality

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  application:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run test:unit
      - run: npm run test:components
      - run: npm run test:accessibility
      - run: npm run test:import
      - run: npm run typecheck
      - run: npm run build
      - run: npm run lint

  database:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run db:start
      - run: npm run db:reset
      - run: npm run db:lint
      - run: npm run db:test
      - run: npm run db:types
      - run: git diff --exit-code -- src/types/database.generated.ts

  browser:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium firefox webkit
      - run: npm run db:start
      - run: npm run db:reset
      - run: pwsh -NoProfile -File scripts/test-e2e.ps1
